<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Logistics Dashboard</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js 4.4.1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <i class="ri-radar-fill brand-icon"></i>
                <h1 class="brand-text">LOGI-CORE <span>NEXUS</span></h1>
                
                <!-- Filters -->
                <div class="filter-bar">
                    <div class="cyber-multi-select" id="ms-month" data-filter="months" data-placeholder="Tất cả Tháng">
                        <div class="ms-header"><span>Tất cả Tháng</span> <i class="ri-arrow-down-s-line"></i></div>
                        <div class="ms-dropdown" id="dd-month"></div>
                    </div>
                    <div class="cyber-multi-select disabled" id="ms-week" data-filter="weeks" data-placeholder="Tất cả Tuần">
                        <div class="ms-header"><span>Tất cả Tuần</span> <i class="ri-arrow-down-s-line"></i></div>
                        <div class="ms-dropdown" id="dd-week"></div>
                    </div>
                    <div class="cyber-multi-select" id="ms-entity" data-filter="entities" data-placeholder="Tất cả Dự án">
                        <div class="ms-header"><span>Tất cả Dự án</span> <i class="ri-arrow-down-s-line"></i></div>
                        <div class="ms-dropdown" id="dd-entity"></div>
                    </div>
                </div>
            </div>
            
            <div class="header-right">
                <div class="live-status">
                    <span class="pulse-badge"></span>
                    <span>LIVE SYSTEM</span>
                </div>
                <div class="digital-clock" id="live-clock">00:00:00</div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Sidebar Nav -->
            <nav class="sidebar">
                <a href="#" class="nav-tab active" data-tab="overview">
                    <i class="ri-dashboard-3-line"></i>
                    <span>Overview & LTL</span>
                </a>
                <a href="#" class="nav-tab" data-tab="ftl">
                    <i class="ri-truck-line"></i>
                    <span>FTL Dispatch</span>
                </a>
                <a href="#" class="nav-tab" data-tab="settings">
                    <i class="ri-settings-4-line"></i>
                    <span>Cài đặt & Filter</span>
                </a>
            </nav>

            <!-- Dashboard Content -->
            <main class="dashboard-content" id="dashboard-content">
                <!-- Dynamically filled by JS -->
            </main>
        </div>
    </div>

    <!-- Data & App Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
