<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Logistics Dashboard</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js 4.4.1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Đoạn mã chặn và kiểm tra đăng nhập -->
    <style>
        /* Ẩn toàn bộ web lúc mới vào để chờ kiểm tra đăng nhập, tránh nháy giao diện */
        body { display: none; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCo4OPIgOfktdyUAZsDH6dtbWpsG35oQT8",
            authDomain: "dashboard-dienmay.firebaseapp.com",
            projectId: "dashboard-dienmay",
            storageBucket: "dashboard-dienmay.firebasestorage.app",
            messagingSenderId: "428787799746",
            appId: "1:428787799746:web:e5d7ab504f0190e04dcd5b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email && user.email.endsWith("@ghn.vn")) {
                // Hợp lệ, hiện web lên
                document.body.style.display = "block";
                
                // Hiển thị email người dùng lên góc phải (nếu có id user-email)
                const userEmailSpan = document.getElementById("user-email");
                if(userEmailSpan) userEmailSpan.innerText = user.email;
            } else {
                // Không hợp lệ hoặc chưa đăng nhập -> đuổi về trang login
                window.location.href = "login.html";
            }
        });

        // Cung cấp hàm Đăng xuất cho nút bấm (cần gán vào window để thẻ html gọi được)
        window.handleLogout = function() {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        };
    </script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <i class="ri-radar-fill brand-icon"></i>
                <h1 class="brand-text">LOGI-CORE <span>NEXUS</span></h1>
                
                <!-- Filters -->
                <div class="filter-bar">
                    <div class="cyber-multi-select" id="ms-month" data-filter="months" data-placeholder="Tất cả Tháng">
                        <div class="ms-header"><span>Tất cả Tháng</span> <i class="ri-arrow-down-s-line"></i></div>
                        <div class="ms-dropdown" id="dd-month"></div>
                    </div>
                    <div class="cyber-multi-select disabled" id="ms-week" data-filter="weeks" data-placeholder="Tất cả Tuần">
                        <div class="ms-header"><span>Tất cả Tuần</span> <i class="ri-arrow-down-s-line"></i></div>
                        <div class="ms-dropdown" id="dd-week"></div>
                    </div>
                    <div class="cyber-multi-select" id="ms-entity" data-filter="entities" data-placeholder="Tất cả Dự án">
                        <div class="ms-header"><span>Tất cả Dự án</span> <i class="ri-arrow-down-s-line"></i></div>
                        <div class="ms-dropdown" id="dd-entity"></div>
                    </div>
                </div>
            </div>
            
            <div class="header-right">
                <div class="user-profile" style="display: flex; align-items: center; gap: 15px; margin-right: 25px; border-right: 1px solid rgba(102, 252, 241, 0.2); padding-right: 25px;">
                    <span id="user-email" style="font-size: 14px; color: #66fcf1; font-weight: 500;"></span>
                    <button onclick="handleLogout()" style="background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; color: #ff4d4d; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 5px; font-family: 'Outfit', sans-serif; font-size: 13px;" onmouseover="this.style.background='#ff4d4d'; this.style.color='#fff';" onmouseout="this.style.background='rgba(255, 77, 77, 0.1)'; this.style.color='#ff4d4d';">
                        <i class="ri-logout-box-r-line"></i> Thoát
                    </button>
                </div>
                <div class="live-status">
                    <span class="pulse-badge"></span>
                    <span>LIVE SYSTEM</span>
                </div>
                <div class="digital-clock" id="live-clock">00:00:00</div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Sidebar Nav -->
            <nav class="sidebar">
                <a href="#" class="nav-tab active" data-tab="overview">
                    <i class="ri-dashboard-3-line"></i>
                    <span>Overview & LTL</span>
                </a>
                <a href="#" class="nav-tab" data-tab="ftl">
                    <i class="ri-truck-line"></i>
                    <span>FTL Dispatch</span>
                </a>
                <a href="#" class="nav-tab" data-tab="settings">
                    <i class="ri-settings-4-line"></i>
                    <span>Cài đặt & Filter</span>
                </a>
            </nav>

            <!-- Dashboard Content -->
            <main class="dashboard-content" id="dashboard-content">
                <!-- Dynamically filled by JS -->
            </main>
        </div>
    </div>

    <!-- Data & App Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
